        <script>
            // JavaScript code for handling form submission, validation, etc.
            const contactNoInput = document.getElementById('contact');
            const emailInput = document.getElementById('email-address');

            contactNoInput.addEventListener('input', function() {
                if(this.value.length != 11 || !/^\d+$/.test(this.value)) {
                    this.setCustomValidity('Contact number must be exactly 11 digits and contain only numbers.');
                } else {
                    this.setCustomValidity('');
                }
            });
            
            emailInput.addEventListener('input', function() {
                fetch(
                    "insert.php?&emailInput=" +
                        this.value
                )
                .then((response) => response.text())

                .then((data) => {
                    if (data.includes("emailExists")) {
                        this.setCustomValidity('This email address is already registered.');
                    } else {
                        this.setCustomValidity('');
                    }
                });

                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if(!emailPattern.test(this.value)) {
                    this.setCustomValidity('Please enter a valid email address.');
                } else {
                    this.setCustomValidity('');
                }
            });

            const addButton = document.getElementById("addParentGuardianBtn");
            const subtractButton = document.getElementById("subtractBtn");

            const parentSections = document.querySelectorAll(".parent-section");

            let currentParent = 1;

            function toggleInputs(section, disable) {
                section.querySelectorAll("input").forEach(input => {
                    input.disabled = disable;
                });
            }

            function clearInputs(section) {
                section.querySelectorAll("input").forEach(input => {
                    if (input.type === "radio") {
                        input.checked = false;
                    } else {
                        input.value = "";
                    }
                });
            }

            // Guardian 2 and 3 start disabled
            toggleInputs(parentSections[1], true);
            toggleInputs(parentSections[2], true);

            subtractButton.addEventListener("click", function () {

                if (currentParent === parentSections.length - 1) {

                    parentSections[currentParent].classList.add("hidden");
                    toggleInputs(parentSections[currentParent], true);
                    clearInputs(parentSections[currentParent]);

                    addButton.style.display = "inline-block";
                    currentParent--;

                } else {

                    currentParent = 1;

                    parentSections[currentParent].classList.add("hidden");
                    toggleInputs(parentSections[currentParent], true);
                    clearInputs(parentSections[currentParent]);

                    subtractButton.style.display = "none";
                    addButton.style.display = "inline-block";
                }
            });

            addButton.addEventListener("click", function () {

                if (currentParent < parentSections.length - 1) {

                    parentSections[currentParent].classList.remove("hidden");
                    toggleInputs(parentSections[currentParent], false);

                    subtractButton.style.display = "inline-block";
                    currentParent++;

                } else {

                    currentParent = 2;

                    parentSections[currentParent].classList.remove("hidden");
                    toggleInputs(parentSections[currentParent], false);

                    addButton.style.display = "none";
                }
            });

            const backButton = document.querySelectorAll("#backBtn, #backBtnNav");

            backButton.forEach(button => {
                button.addEventListener("click", function() {
                    window.location.href = "menu.html";
                });
            });

            const form = document.querySelector("form");
            const resetButtonNav = document.getElementById("resetBtnNav");

            resetButtonNav.addEventListener("click", function() {
                form.reset();
            });

            const navbar = document.getElementById("navbar");
            navbar.classList.add("hidden");

            window.addEventListener("scroll", () => {
                const scrollTop = window.scrollY;
                const windowHeight = window.innerHeight;
                const documentHeight = document.documentElement.scrollHeight;

                const atTop = scrollTop <= 0;
                const atBottom =
                    windowHeight + scrollTop >= documentHeight - 5;

                if (atTop || atBottom) {
                    navbar.classList.add("hidden");
                } else {
                    navbar.classList.remove("hidden");
                }
            });
        </script>
