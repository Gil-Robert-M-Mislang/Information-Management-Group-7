                            placeholder="Educational Attainment">
                        <input 
                            type="text"
                            id="pg3-occupation"
                            name="parentguardian[Occupation][2]"
                            placeholder="Occupation">
                        <div class="income-earner">
                            <span class="income-label">Is Income Earner?</span>
                            <div class="radio-group">
                                <input 
                                    type="radio"
                                    id="pg3-earner-yes"
                                    name="applicantguardian[IsIncomeEarner][2]"
                                    value="Yes">
                                <label for="pg3-earner-yes">Yes</label>
                                <input 
                                    type="radio"
                                    id="pg3-earner-no"
                                    name="applicantguardian[IsIncomeEarner][2]"
                                    value="No">
                                <label for="pg3-earner-no">No</label>
                            </div>
                        </div>
                    </div>

                <h2 class="category">Socio-Economic Background</h2>
                    <div class="container socio-economic">

                    <!-- house ownership-->
                        <label class="main-label">
                            House Ownership Status</label>
                        <div>
                            <input 
                                type="radio"
                                id="owned"
                                name="applicant[HouseOwnership]"
                                value="Owned">
                            <label for="owned">Owned</label>
                        </div>

                        <div>
                            <input 
                                type="radio"
                                id="rented"
                                name="applicant[HouseOwnership]"
                                value="Rented">
                            <label for="rented">Rented</label>
                        </div>

                        <div>
                            <input 
                                type="radio"
                                id="living-with-relatives"
                                name="applicant[HouseOwnership]"
                                value="Living with Relatives">
                            <label for="living-with-relatives">Living with Relatives</label>
                        </div>

                        <div>
                            <input 
                                type="radio"
                                id="amortized"
                                name="applicant[HouseOwnership]"
                                value="Amortized / Mortgaged">
                            <label for="amortized">Amortized / Mortgaged</label>
                        </div>

                        <div>
                            <input 
                                type="radio"
                                id="others-house-own"
                                name="applicant[HouseOwnership]"
                                value="Others">
                            <label for="others-house-own">Others</label>
                        </div> 
                    </div>

                        <div class="dropdown">
                            <label for="monthly-income">Gross Monthly Family Income</label>
                            <select id="monthly-income" name="applicant[GrossMonthlyFamilyIncome]" required>
                                <option value="" disabled selected>Select option</option>
                                <option value="below-20,000">Below 20,000</option>
                                <option value="20,000-39,999">20,000 to 39,999</option>
                                <option value="40,000-59,999">40,000 to 59,999</option>
                                <option value="60,000-above">60,000 and above</option>
                            </select>
                        </div>
                <div class="buttons">
                    <button type="submit" class="submit">Submit</button>
                    <button type="reset" class="reset">Reset</button>
                </div>
            </form>
        </div>
    </body>
</html>
